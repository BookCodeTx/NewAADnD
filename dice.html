<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice Roller</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    #dice-box canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    #roll-label {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 600;
      background: rgba(15, 52, 96, 0.85);
      padding: 6px 18px;
      border-radius: 8px;
      border: 1px solid #e94560;
      text-shadow: 0 0 8px rgba(233, 69, 96, 0.6);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 10;
      pointer-events: none;
    }

    #roll-label.visible { opacity: 1; }

    #result-display {
      position: fixed;
      bottom: 20%;
      left: 50%;
      transform: translateX(-50%) scale(0);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 48px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 20px rgba(233, 69, 96, 0.8), 0 0 40px rgba(233, 69, 96, 0.4);
      z-index: 10;
      pointer-events: none;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s;
    }

    #result-display.visible {
      transform: translateX(-50%) scale(1);
    }

    #result-display.fade-out {
      opacity: 0;
      transform: translateX(-50%) scale(1.3);
    }

    #result-display .result-detail {
      font-size: 14px;
      font-weight: 400;
      color: #c0c8d4;
      text-shadow: none;
      text-align: center;
      margin-top: 4px;
    }

    .nat-crit { color: #ffd700 !important; text-shadow: 0 0 30px rgba(255, 215, 0, 0.9), 0 0 60px rgba(255, 215, 0, 0.5) !important; }
    .nat-fail { color: #e94560 !important; text-shadow: 0 0 30px rgba(233, 69, 96, 0.9), 0 0 60px rgba(233, 69, 96, 0.5) !important; }
  </style>
</head>
<body>
  <div id="dice-box"></div>
  <div id="roll-label"></div>
  <div id="result-display"></div>
  <script type="module" src="/dice.js"></script>
</body>
</html>
